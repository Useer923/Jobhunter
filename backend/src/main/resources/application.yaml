spring:
  application:
    name: jobhunter

  datasource:
    url: jdbc:h2:mem:jobhunter
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false

server:
  port: 8080